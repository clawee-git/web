# clawee.org — the static marketing + docs site
#
# Serves the static files from this repo (index.html, help.html, style.css,
# script.js, assets/) mirrored to STATIC_DIR by deploy/deploy.sh.
#
# Host: nsm.renative.com (the same box that fronts release.clawee.org / console
# / umbree / burree / release.burrowee.com). Edge: Cloudflare, Full (strict) —
# the origin presents a real cert; CF connects over TLS and validates it.
#
# DEPLOY LOCATION (nsm specifics — see ops/README.md):
#   This host's nginx.conf includes ONLY /etc/nginx/sites-enabled/* — it does
#   NOT include /etc/nginx/conf.d/*.conf. Drop this file into
#   /etc/nginx/sites-enabled/ (the .conf extension is fine there). A copy under
#   conf.d/ is SILENTLY IGNORED.
#   This host's nginx build also rejects TLSv1.3 — keep ssl_protocols at TLSv1.2.
#   Do NOT mark this server default_server: another sites-enabled file already
#   owns default_server on :443.

server {
    listen 80;
    listen [::]:80;
    server_name clawee.org www.clawee.org;

    # Cloudflare handles the public redirect; belt-and-suspenders for any
    # direct-to-origin http hit.
    return 301 https://clawee.org$request_uri;
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.clawee.org;

    ssl_certificate     /etc/letsencrypt/live/clawee.org/fullchain.pem;  # OPERATOR: set real path
    ssl_certificate_key /etc/letsencrypt/live/clawee.org/privkey.pem;    # OPERATOR: set real path
    ssl_protocols       TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    return 301 https://clawee.org$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clawee.org;

    # === TLS — OPERATOR PLACEHOLDERS ===========================================
    # Issue/point these at the host cert for clawee.org, then reload.
    # (Mirror the release.clawee.org / console vhosts on this host.) On nsm,
    # ONLY TLSv1.2 is accepted.
    ssl_certificate     /etc/letsencrypt/live/clawee.org/fullchain.pem;  # OPERATOR: set real path
    ssl_certificate_key /etc/letsencrypt/live/clawee.org/privkey.pem;    # OPERATOR: set real path
    ssl_protocols       TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    # ===========================================================================

    # Static root — must match STATIC_DIR in deploy/deploy.sh.
    root  /ebs_storage/apps/clawee.org/static;
    index index.html;

    server_tokens off;
    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }

    # Long-cache the immutable static assets; keep HTML short so content updates
    # propagate quickly.
    location ~* \.(css|js|svg|png|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300";
    }
}
